<!DOCTYPE html>
<html>
<head>
    <title>Edit Monthly Expense</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
	<link rel="stylesheet" type="text/css" href="/static/style.css" />
</head>

<body>
<div class="container mt-4">
    <h2 class="text-center mb-4">Edit Monthly Expense</h2>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Expense Name</label>
            <input type="text" name="expense_name"
                   class="form-control"
                   value="{{ expense[1] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" name="amount"
                   class="form-control"
                   value="{{ expense[2] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Month</label>
            <input type="text" name="month_year"
                   class="form-control"
                   value="{{ expense[3] }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description"
                      class="form-control">{{ expense[4] }}</textarea>
        </div>

        <button class="btn btn-success">Update</button>
        <a href="/monthly" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/service-worker.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.error("SW failed", err));
}
</script>

</html>
